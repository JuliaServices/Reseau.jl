name: CI
on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:
# Least-privilege default token scope for all jobs; the docs job opts into the
# wider scope it needs via its own job-level permissions block.
permissions:
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - t${{ matrix.threads }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 20 || 15 }}
    env:
      JULIA_NUM_THREADS: ${{ matrix.threads }}
      RESEAU_RUN_TLS_TESTS: '1'
      RESEAU_RUN_NETWORK_TESTS: '1'
      RESEAU_TRIM_EXE_TIMEOUT_S: "60.0"
      RESEAU_TRIM_BUNDLE: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1'
            os: ubuntu-latest
            arch: x64
            threads: 1
          - version: 'min'
            os: ubuntu-latest
            arch: x64
            threads: 1
          - version: 'pre'
            os: ubuntu-latest
            arch: x64
            threads: 1
          - version: '1'
            os: windows-latest
            arch: x64
            threads: 1
          - version: 'min'
            os: windows-latest
            arch: x64
            threads: 1
          - version: 'pre'
            os: windows-latest
            arch: x64
            threads: 1
          - version: '1'
            os: macOS-latest
            arch: aarch64
            threads: 1
          - version: 'min'
            os: macOS-latest
            arch: aarch64
            threads: 1
          - version: 'pre'
            os: macOS-latest
            arch: aarch64
            threads: 1
          - version: '1'
            os: ubuntu-latest
            arch: x64
            threads: 2
          - version: '1'
            os: windows-latest
            arch: x64
            threads: 2
          - version: '1'
            os: macOS-latest
            arch: aarch64
            threads: 2
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && matrix.version == '1' && matrix.threads == 1
        uses: julia-actions/julia-processcoverage@v1
      - if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && matrix.version == '1' && matrix.threads == 1
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.GITHUB_TOKEN }}
  test-freebsd:
    name: Julia ${{ matrix.version }} - FreeBSD ${{ matrix.release }} - ${{ matrix.arch }} - t${{ matrix.threads }} - ${{ github.event_name }}
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_THREADS: ${{ matrix.threads }}
      RESEAU_RUN_TLS_TESTS: '1'
      RESEAU_RUN_NETWORK_TESTS: '1'
      RESEAU_RUN_TRIM_TESTS: '0'  # TODO: Reenable once FreeBSD support in PackageCompiler and JuliaC is fixed
      RESEAU_TRIM_EXE_TIMEOUT_S: "60.0"
      RESEAU_TRIM_BUNDLE: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1'
            threads: 1
            arch: "x86_64"
            release: "15.0"
          - version: '1'
            threads: 2
            arch: "x86_64"
            release: "15.0"
    steps:
      - uses: actions/checkout@v6
        with:
          # Keep the repository token out of .git/config in the workspace the
          # FreeBSD VM shares; this job only builds and tests, never pushes.
          persist-credentials: false
      - uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          arch: ${{ matrix.arch }}
          envs: 'JULIA_NUM_THREADS RESEAU_RUN_TLS_TESTS RESEAU_RUN_NETWORK_TESTS RESEAU_RUN_TRIM_TESTS RESEAU_TRIM_EXE_TIMEOUT_S RESEAU_TRIM_BUNDLE'
          usesh: true
          copyback: false
          prepare: |
            pkg install -y git
            chown -R $(whoami) .  # Work around file ownership differences between runner and VM
            # Pretend we're running on Cirrus CI (RIP) to reuse FreeBSD testing setup
            export JULIA_VERSION="${{ matrix.version }}"
            export CIRRUS_CI="true"
            export CIRRUS_OS="freebsd"
            export CIRRUS_WORKING_DIR="${PWD}"
            export CIRRUS_REPO_NAME="${GITHUB_REPOSITORY}"
            # Pin the third-party installer to an immutable commit and verify its
            # checksum before executing, so a compromised CirrusCI.jl master
            # cannot inject code into this job.
            CIRRUS_INSTALL_SHA="48cdcde6677896eb1baa3226fd51ac889b830617"
            CIRRUS_INSTALL_SHA256="243e38fca52d2a2cb06f0515bc44d2684271f839acddf099e3e0107cd1383e47"
            fetch "https://raw.githubusercontent.com/ararslan/CirrusCI.jl/${CIRRUS_INSTALL_SHA}/bin/install.sh" -o cirrus_install.sh
            actual_sha256="$(sha256 -q cirrus_install.sh)"
            if [ "${actual_sha256}" != "${CIRRUS_INSTALL_SHA256}" ]; then
              echo "CirrusCI.jl install.sh checksum mismatch: ${actual_sha256}" >&2
              exit 1
            fi
            sh cirrus_install.sh
          run: |
            cirrusjl build
            cirrusjl test
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install docs dependencies
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Run docstring doctests
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Documenter: doctest
            using Reseau
            doctest(Reseau)'
      - name: Build and deploy docs
        run: julia --project=docs --startup-file=no --history-file=no docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
