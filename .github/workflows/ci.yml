name: CI
on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 20 || 15 }}
    env:
      JULIA_NUM_THREADS: 1
      RESEAU_RUN_TLS_TESTS: '1'
      RESEAU_RUN_NETWORK_TESTS: '1'
      RESEAU_TRIM_EXE_TIMEOUT_S: "60.0"
      RESEAU_TRIM_BUNDLE: ${{ matrix.os == 'windows-latest' && '1' || '0' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'   # latest stable Julia 1.x
          - 'min' # minimum Julia version from Project.toml compat
          - 'pre' # latest pre-release Julia
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && matrix.version == '1'
        uses: julia-actions/julia-processcoverage@v1
      - if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && matrix.version == '1'
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.GITHUB_TOKEN }}
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install docs dependencies
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Run docstring doctests
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Documenter: doctest
            using Reseau
            doctest(Reseau)'
      - name: Build and deploy docs
        run: julia --project=docs --startup-file=no --history-file=no docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
