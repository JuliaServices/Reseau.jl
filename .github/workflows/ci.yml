name: CI
on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      JULIA_NUM_THREADS: 1
      RESEAU_RUN_TLS_TESTS: ${{ matrix.run_tls_tests }}
      RESEAU_RUN_NETWORK_TESTS: ${{ matrix.run_network_tests }}
      RESEAU_TRIM_EXE_TIMEOUT_S: "60.0"
      RESEAU_TRIM_BUNDLE: ${{ matrix.trim_bundle }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            version: '1.10'
            timeout_minutes: 15
            run_tls_tests: '1'
            run_network_tests: '1'
            trim_bundle: '0'
            coverage: '1'
          - os: macOS-latest
            arch: aarch64
            version: '1.10'
            timeout_minutes: 15
            run_tls_tests: '1'
            run_network_tests: '1'
            trim_bundle: '0'
            coverage: '0'
          - os: windows-latest
            arch: x64
            version: '1.10'
            timeout_minutes: 20
            run_tls_tests: '1'
            run_network_tests: '1'
            trim_bundle: '1'
            coverage: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - if: matrix.coverage == '1'
        uses: julia-actions/julia-processcoverage@v1
      - if: matrix.coverage == '1'
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.GITHUB_TOKEN }}
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install docs dependencies
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Run docstring doctests
        run: |
          julia --project=docs --startup-file=no --history-file=no -e '
            using Documenter: doctest
            using Reseau
            doctest(Reseau)'
      - name: Build and deploy docs
        run: julia --project=docs --startup-file=no --history-file=no docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
