name: Windows HostResolvers Debug
on:
  workflow_dispatch:

jobs:
  hostres-debug:
    name: Windows host_resolvers t2 debug
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      JULIA_NUM_THREADS: "2"
      RESEAU_RUN_TLS_TESTS: "1"
      RESEAU_RUN_NETWORK_TESTS: "1"
      RESEAU_TEST_ONLY: "host_resolvers_tests.jl"
      RESEAU_WINDOWS_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
          arch: x64
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
