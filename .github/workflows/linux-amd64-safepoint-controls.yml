name: linux-amd64 safepoint controls

on:
  workflow_dispatch:

jobs:
  controls:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.11.9', '1.12.5']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: x64
      - name: Host info
        run: |
          set -euxo pipefail
          uname -a
          uname -m
          julia --version
          julia -e 'println("Sys.ARCH=", Sys.ARCH); println("nthreads=", Threads.nthreads()); println("image=", unsafe_string(Base.JLOptions().image_file))'
      - name: Build controls
        run: |
          set -euo pipefail
          cat >/tmp/foreign_manual.jl <<'JL'
          module ForeignManual
          mutable struct Ctx
              state::Threads.Atomic{Int}
              stop::Threads.Atomic{Int}
              counter::Threads.Atomic{Int}
          end
          function thread_entry(arg::Ptr{Cvoid})::Ptr{Cvoid}
              ctx = unsafe_pointer_to_objref(arg)::Ctx
              Threads.atomic_xchg!(ctx.state, 1)
              while Threads.atomic_cas!(ctx.stop, 0, 0) == 0
                  gc_state = @ccall jl_gc_safe_enter()::Int8
                  @ccall usleep(Cuint(1000)::Cuint)::Cint
                  @ccall jl_gc_safe_leave(gc_state::Int8)::Cvoid
                  Threads.atomic_add!(ctx.counter, 1)
              end
              Threads.atomic_xchg!(ctx.state, 2)
              return C_NULL
          end
          const ENTRY = @cfunction(thread_entry, Ptr{Cvoid}, (Ptr{Cvoid},))
          function run()
              ctx = Ctx(Threads.Atomic{Int}(0), Threads.Atomic{Int}(0), Threads.Atomic{Int}(0))
              thread = Ref{UInt}(0)
              GC.@preserve ctx begin
                  ret = @ccall pthread_create(
                      thread::Ref{UInt},
                      C_NULL::Ptr{Cvoid},
                      ENTRY::Ptr{Cvoid},
                      pointer_from_objref(ctx)::Ptr{Cvoid},
                  )::Cint
                  ret == 0 || error("pthread_create failed: $ret")
                  while Threads.atomic_cas!(ctx.state, 1, 1) != 1
                      yield()
                  end
                  for _ in 1:2_000
                      Vector{Any}(undef, 10_000)
                      GC.gc(false)
                  end
                  Threads.atomic_xchg!(ctx.stop, 1)
                  @ccall pthread_join(thread[]::UInt, C_NULL::Ptr{Cvoid})::Cint
              end
              return nothing
          end
          if ccall(:jl_generating_output, Cint, ()) == 1
              run()
          end
          end
          JL

          cat >/tmp/foreign_native.jl <<'JL'
          module ForeignNative
          mutable struct Ctx
              state::Threads.Atomic{Int}
              stop::Threads.Atomic{Int}
              counter::Threads.Atomic{Int}
          end
          function thread_entry(arg::Ptr{Cvoid})::Ptr{Cvoid}
              ctx = unsafe_pointer_to_objref(arg)::Ctx
              Threads.atomic_xchg!(ctx.state, 1)
              while Threads.atomic_cas!(ctx.stop, 0, 0) == 0
                  @ccall gc_safe=true usleep(Cuint(1000)::Cuint)::Cint
                  Threads.atomic_add!(ctx.counter, 1)
              end
              Threads.atomic_xchg!(ctx.state, 2)
              return C_NULL
          end
          const ENTRY = @cfunction(thread_entry, Ptr{Cvoid}, (Ptr{Cvoid},))
          function run()
              ctx = Ctx(Threads.Atomic{Int}(0), Threads.Atomic{Int}(0), Threads.Atomic{Int}(0))
              thread = Ref{UInt}(0)
              GC.@preserve ctx begin
                  ret = @ccall pthread_create(
                      thread::Ref{UInt},
                      C_NULL::Ptr{Cvoid},
                      ENTRY::Ptr{Cvoid},
                      pointer_from_objref(ctx)::Ptr{Cvoid},
                  )::Cint
                  ret == 0 || error("pthread_create failed: $ret")
                  while Threads.atomic_cas!(ctx.state, 1, 1) != 1
                      yield()
                  end
                  for _ in 1:2_000
                      Vector{Any}(undef, 10_000)
                      GC.gc(false)
                  end
                  Threads.atomic_xchg!(ctx.stop, 1)
                  @ccall pthread_join(thread[]::UInt, C_NULL::Ptr{Cvoid})::Cint
              end
              return nothing
          end
          if ccall(:jl_generating_output, Cint, ()) == 1
              run()
          end
          end
          JL

          cat >/tmp/spawn_native.jl <<'JL'
          module SpawnNative
          mutable struct Ctx
              state::Threads.Atomic{Int}
              stop::Threads.Atomic{Int}
              counter::Threads.Atomic{Int}
          end
          function worker(ctx::Ctx)
              Threads.atomic_xchg!(ctx.state, 1)
              while Threads.atomic_cas!(ctx.stop, 0, 0) == 0
                  @ccall gc_safe=true usleep(Cuint(1000)::Cuint)::Cint
                  Threads.atomic_add!(ctx.counter, 1)
              end
              Threads.atomic_xchg!(ctx.state, 2)
              return nothing
          end
          function run()
              Threads.nthreads() >= 2 || error("run with at least two Julia threads")
              ctx = Ctx(Threads.Atomic{Int}(0), Threads.Atomic{Int}(0), Threads.Atomic{Int}(0))
              task = Threads.@spawn worker(ctx)
              while Threads.atomic_cas!(ctx.state, 1, 1) != 1
                  yield()
              end
              for _ in 1:2_000
                  Vector{Any}(undef, 10_000)
                  GC.gc(false)
              end
              Threads.atomic_xchg!(ctx.stop, 1)
              wait(task)
              return nothing
          end
          if ccall(:jl_generating_output, Cint, ()) == 1
              run()
          end
          end
          JL

          cat >/tmp/foreign_manual_runtime_driver.jl <<'JL'
          include("/tmp/foreign_manual.jl")
          ForeignManual.run()
          JL
          cat >/tmp/foreign_manual_pkgout_driver.jl <<'JL'
          Base.include(Base.__toplevel__, "/tmp/foreign_manual.jl")
          JL
          cat >/tmp/foreign_native_runtime_driver.jl <<'JL'
          include("/tmp/foreign_native.jl")
          ForeignNative.run()
          JL
          cat >/tmp/foreign_native_pkgout_driver.jl <<'JL'
          Base.include(Base.__toplevel__, "/tmp/foreign_native.jl")
          JL
          cat >/tmp/spawn_native_runtime_driver.jl <<'JL'
          include("/tmp/spawn_native.jl")
          SpawnNative.run()
          JL
          cat >/tmp/spawn_native_pkgout_driver.jl <<'JL'
          Base.include(Base.__toplevel__, "/tmp/spawn_native.jl")
          JL
      - name: Run controls
        run: |
          set +e
          SYSIMAGE="$(julia -e 'print(unsafe_string(Base.JLOptions().image_file))')"
          run_normal() {
              label="$1"
              driver="$2"
              threads="$3"
              echo "=== normal $label ==="
              for i in 1 2 3 4 5; do
                  if [ "$threads" = "2" ]; then
                      timeout 20s julia -t2 -C native -g1 --startup-file=no --history-file=no "$driver"
                  else
                      timeout 20s julia -C native -g1 --startup-file=no --history-file=no "$driver"
                  fi
                  status=$?
                  echo "STATUS normal $label $i $status"
              done
          }
          run_pkgout() {
              label="$1"
              driver="$2"
              threads="$3"
              echo "=== pkgout $label ==="
              for i in 1 2 3 4 5; do
                  if [ "$threads" = "2" ]; then
                      timeout 20s julia -t2 -C native -J"$SYSIMAGE" -g1 --startup-file=no --history-file=no --output-ji="/tmp/$label-$i.ji" --output-incremental=yes "$driver"
                  else
                      timeout 20s julia -C native -J"$SYSIMAGE" -g1 --startup-file=no --history-file=no --output-ji="/tmp/$label-$i.ji" --output-incremental=yes "$driver"
                  fi
                  status=$?
                  echo "STATUS pkgout $label $i $status"
              done
          }

          run_normal foreign_manual /tmp/foreign_manual_runtime_driver.jl 1
          run_pkgout foreign_manual /tmp/foreign_manual_pkgout_driver.jl 1
          if julia --startup-file=no -e 'VERSION >= v"1.12" || exit(7)'; then
              run_normal foreign_native /tmp/foreign_native_runtime_driver.jl 1
              run_pkgout foreign_native /tmp/foreign_native_pkgout_driver.jl 1
              run_normal spawn_native /tmp/spawn_native_runtime_driver.jl 2
              run_pkgout spawn_native /tmp/spawn_native_pkgout_driver.jl 2
          else
              echo "native gc_safe syntax unavailable on $(julia --version)"
          fi
          exit 0
