name: Windows Compiler Repro

on:
  push:
    branches:
      - windows-nightly-compiler-investigation
  workflow_dispatch:

jobs:
  repro:
    name: Julia nightly - windows-latest - compiler repro - layer ${{ matrix.max_layer }}
    runs-on: windows-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        max_layer: [5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
          arch: x64
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run package-load repro
        shell: bash
        env:
          RESEAU_REPRO_MAX_LAYER: ${{ matrix.max_layer }}
        run: |
          set -euo pipefail
          echo "[repro] pwd=${PWD}"
          echo "[repro] RESEAU_REPRO_MAX_LAYER=${RESEAU_REPRO_MAX_LAYER}"
          julia \
            --color=yes \
            --project=. \
            --check-bounds=yes \
            --compiled-modules=yes \
            --depwarn=yes \
            --inline=yes \
            --startup-file=no \
            --track-allocation=none \
            --code-coverage="@${PWD}" \
            repro/windows-compiler-issue-use-reseau.jl
