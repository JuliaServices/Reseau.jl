name: Windows Compiler Repro

on:
  push:
    branches:
      - windows-nightly-compiler-investigation
  workflow_dispatch:

jobs:
  repro:
    name: Julia nightly - windows-latest - compiler repro - ${{ matrix.case }}
    runs-on: windows-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: tcp-open-catch-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-open-catch-layer4.jl
          - case: tcp-bind-init-catch-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-bind-init-catch-layer4.jl
          - case: tcp-full-copied-nocatch-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-full-copied-nocatch-layer4.jl
          - case: tcp-full-copied-arg-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-full-copied-arg-layer4.jl
          - case: tcp-full-copied-kwargs-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-full-copied-kwargs-layer4.jl
          - case: tcp-full-copied-kwargs-kwcall-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-full-copied-kwargs-kwcall-layer4.jl
          - case: tcp-full-copied-catch-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-full-copied-catch-layer4.jl
          - case: hostresolver-connect
            max_layer: 5
            repro_script: repro/windows-compiler-issue-hostresolver-connect.jl
          - case: wait-connect-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-wait-connect-layer4.jl
          - case: tcp-connect-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-connect-layer4.jl
          - case: tcp-connect-explicit-defaults-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-connect-explicit-defaults-layer4.jl
          - case: tcp-connect-constant-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-connect-constant-layer4.jl
          - case: tcp-connect-kwcall-layer4
            max_layer: 4
            repro_script: repro/windows-compiler-issue-tcp-connect-kwcall-layer4.jl
          - case: standalone-connect
            max_layer: 0
            repro_script: repro/windows-compiler-issue-standalone-connect.jl
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
          arch: x64
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run repro
        shell: bash
        env:
          RESEAU_REPRO_MAX_LAYER: ${{ matrix.max_layer }}
        run: |
          set -euo pipefail
          echo "[repro] pwd=${PWD}"
          echo "[repro] case=${{ matrix.case }}"
          echo "[repro] RESEAU_REPRO_MAX_LAYER=${RESEAU_REPRO_MAX_LAYER}"
          julia \
            --color=yes \
            --project=. \
            --check-bounds=yes \
            --compiled-modules=yes \
            --depwarn=yes \
            --inline=yes \
            --startup-file=no \
            --track-allocation=none \
            --code-coverage="@${PWD}" \
            "${{ matrix.repro_script }}"
